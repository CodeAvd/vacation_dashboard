<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vacation Dashboard</title>
  <link rel="icon" href="data:,">
  <meta http-equiv="refresh" content="0; url=./GDD/report_final.html">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1eb;
      --surface: #fffdf8;
      --line: #d3c8b9;
      --text: #2a2018;
      --muted: #716454;
      --accent: #285f59;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #fff7ee 0%, var(--bg) 65%, #efe7da 100%);
      color: var(--text);
      font: 16px/1.5 "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 640px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font: 700 1.8rem/1.15 "Sora", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening dashboard...</h1>
    <p>If the redirect does not happen automatically, open <a href="./GDD/report_final.html">the dashboard</a>.</p>
  </main>
</body>
</html>
